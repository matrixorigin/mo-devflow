# Copy to config/repos/matrixone.local.yaml for local development.
# Do not commit the copied file. It may contain real GitHub logins,
# local checkout paths, and notification routing details.

repo:
  local_path: /path/to/matrixone

access:
  # Keep committed profiles read-only by default. Set this only in a local
  # untracked profile when you are ready to preview and confirm GitHub writes
  # through your own connected token.
  write_back_enabled: true

people:
  watched_users:
    - developer-a
    - developer-b
  testers:
    - tester-a
    - tester-b

testing:
  handoff_signals:
    labels: []

workflow:
  skip_users:
    - automation-or-maintenance-user
